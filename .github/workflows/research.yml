name: web3-research
on:
  schedule:
    - cron: "37 */4 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil
      - name: Run research
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: python research/run.py
      - name: Commit output
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add research/output research/state.json
          git commit -m "update research" || true
          git push || true

      - name: Trigger content-factory packaging (repository_dispatch, strict)
        env:
          TOKEN: ${{ secrets.CONTENT_FACTORY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TOKEN:-}" ]; then
            echo "FATAL: CONTENT_FACTORY_DISPATCH_TOKEN is empty"
            exit 1
          fi

          HTTP_STATUS=$(curl -sS -o /tmp/content_factory_dispatch_resp.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/brucey0017-cloud/content-factory/dispatches \
            -d '{"event_type":"rssbot_research_done"}')

          if [ "$HTTP_STATUS" -ne 204 ]; then
            echo "FATAL: repository_dispatch failed, HTTP=${HTTP_STATUS}"
            cat /tmp/content_factory_dispatch_resp.json || true
            exit 1
          fi

          echo "OK: repository_dispatch accepted (HTTP 204)"
